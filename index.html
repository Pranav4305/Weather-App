<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App - Bento UI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./src/styles.css">
  <script src="./src/script.js" defer></script>
</head>
<body>
  <!-- Animated Background -->
  <div class="aurora-bg"></div>

  <!-- Main Container -->
  <main class="dashboard">
    <!-- Search Widget -->
    <div class="bento-box search-widget">
      <input type="text" class="search-bar" placeholder="Search for a city..." aria-label="Search city">
      <button class="search-button" aria-label="Search">
        <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 24 24" height="1.5em" width="1.5em" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 18a7.952 7.952 0 0 0 4.897-1.688l4.396 4.396 1.414-1.414-4.396-4.396A7.952 7.952 0 0 0 18 10c0-4.411-3.589-8-8-8s-8 3.589-8 8 3.589 8 8 8zm0-14c3.309 0 6 2.691 6 6s-2.691 6-6 6-6-2.691-6-6 2.691-6 6-6z"></path>
        </svg>
      </button>
    </div>

    <!-- Error State -->
    <div class="bento-box error-widget" id="error-message">
      <p>City not found. Please try again.</p>
    </div>

    <!-- Grid Layout for Weather Data -->
    <div class="bento-grid loading" id="weather-content">
      
      <!-- Primary Weather Box -->
      <div class="bento-box primary-widget">
        <div class="header">
          <h2 class="city">Loading Location</h2>
          <span class="description">Please wait...</span>
        </div>
        <div class="main-info">
          <h1 class="temp">--°</h1>
          <img src="https://openweathermap.org/img/wn/04d@4x.png" alt="Weather icon" class="weather-icon" />
        </div>
      </div>

      <!-- Secondary Metric: Feels Like -->
      <div class="bento-box metric-widget">
        <div class="metric-title">
          <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 24 24" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C6.486 2 2 6.486 2 12s4.486 10 10 10 10-4.486 10-10S17.514 2 12 2zm0 18c-4.411 0-8-3.589-8-8s3.589-8 8-8 8 3.589 8 8-3.589 8-8 8z"></path><path d="M11 11h2v6h-2zm0-4h2v2h-2z"></path></svg>
          Feels Like
        </div>
        <div class="metric-value feels-like">--°</div>
      </div>

      <!-- Secondary Metric: Humidity -->
      <div class="bento-box metric-widget">
        <div class="metric-title">
          <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 16 16" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M8 16a6 6 0 0 0 6-6c0-1.655-1.122-2.904-2.432-4.362C10.254 4.176 8.75 2.503 8 0c-.75 2.503-2.254 4.176-3.568 5.638C3.122 7.096 2 8.345 2 10a6 6 0 0 0 6 6zM6.646 4.646l.708.708C8.5 4.207 8.5 2.226 8.5 2.226v.012c.002.003.003.01.01.026.021.066.064.215.132.443.136.455.35 1.106.618 1.838a19.743 19.743 0 0 0 1.579 3.447 11.238 11.238 0 0 0 1.258 1.764c.224.256.467.545.698.857.227.307.447.653.606 1.054.162.408.269.873.269 1.401 0 1.341-.532 2.545-1.393 3.42C11.411 15.612 10.25 16 9 16c-1.25 0-2.411-.388-3.279-1.026C4.858 14.098 4.327 12.894 4.327 11.554c0-.528.107-.993.269-1.401.159-.401.379-.747.606-1.054.23-.312.474-.601.698-.857a11.235 11.235 0 0 0 1.258-1.764 19.743 19.743 0 0 0 1.579-3.447c.268-.732.482-1.383.618-1.838a6.387 6.387 0 0 0 .142-.469z"/></svg>
          Humidity
        </div>
        <div class="metric-value humidity-text">--%</div>
      </div>

      <!-- Secondary Metric: Wind -->
      <div class="bento-box metric-widget">
        <div class="metric-title">
          <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 24 24" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><path fill="none" d="M0 0h24v24H0z"></path><path d="M12.22 17.037l-1.04-.6 1.956-3.388h-5.07v-1.2h5.07l-1.956-3.388 1.04-.6 2.65 4.588-2.65 4.588zM4.5 11.45V6.7H1.3V5.5H5.7v5.95H4.5zM17.5 12h-3v-1.2h3V6.05h1.2v5.95h-1.2v-1.2zm-12.28-.6l2.65-4.588 1.04.6-1.956 3.388h5.07v1.2H6.953l1.956 3.388-1.04.6-2.65-4.588z"></path></svg>
          Wind
        </div>
        <div class="metric-value wind-text">-- km/h</div>
      </div>

      <!-- Secondary Metric: Pressure -->
      <div class="bento-box metric-widget">
        <div class="metric-title">
          <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 24 24" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C6.486 2 2 6.486 2 12s4.486 10 10 10 10-4.486 10-10S17.514 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"></path></svg>
          Pressure
        </div>
        <div class="metric-value pressure">-- hPa</div>
      </div>

    </div>
  </main>
</body>
</html>
